server:
  port: 8081

spring:
  application:
    name: nexo-vivienda-backend

  # 1. Configuración de PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/vivienda_universitaria_db
    username: postgres_admin
    password: admin_password_123
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 2. Configuración de MongoDB
  mongodb:
    uri: mongodb://mongo_admin:admin_password_123@localhost:27017/vivienda_mongo_db?authSource=admin